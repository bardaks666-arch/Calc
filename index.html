<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Cost Calculator VK</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-color: #ffffff;
            --accent-color: #007aff;
            --danger-color: #ff453a;
            --success-color: #32d74b;
            --input-bg: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { text-align: center; margin-bottom: 25px; font-weight: 600; }
        .hidden { display: none; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; margin-bottom: 8px; color: #8e8e93; }
        
        input, select {
            width: 100%;
            height: 44px;
            padding: 10px 15px;
            border-radius: 12px;
            border: none;
            background: var(--input-bg);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border: 1px solid var(--accent-color); }

        .row { display: flex; gap: 12px; }
        .row input { flex: 1; }

        button {
            width: 100%;
            height: 50px;
            margin-top: 10px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.7; }

        .btn-main { background-color: var(--accent-color); color: white; margin-top: 20px; }
        .btn-settings { background-color: #3a3a3c; color: white; }
        .btn-save { background-color: var(--success-color); color: white; }
        .btn-delete { background-color: var(--danger-color); color: white; flex: 1; }
        .btn-edit { background-color: #545456; color: white; flex: 1; }
        .btn-add { background-color: #3a3a3c; color: white; flex: 1; }

        #result {
            margin-top: 25px;
            padding: 20px;
            background: #2c2c2e;
            border-radius: 16px;
            line-height: 1.6;
            border: 1px solid #3a3a3c;
        }

        .printer-info {
            font-size: 13px;
            color: var(--accent-color);
            text-align: center;
            margin-bottom: 20px;
            background: rgba(0, 122, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
        }

        .sale-price {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #48484a;
            color: var(--success-color);
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="main-scene">
        <h2>3D Калькулятор</h2>
        
        <div class="input-group">
            <label>Филамент</label>
            <select id="filament-select" onchange="saveSelection()"></select>
        </div>

        <div class="input-group">
            <label>Вес модели (г)</label>
            <input type="number" id="weight" placeholder="0" inputmode="decimal">
        </div>

        <div class="input-group">
            <label>Время печати</label>
            <div class="row">
                <input type="number" id="hours" placeholder="Ч" inputmode="numeric">
                <input type="number" id="mins" placeholder="Мин" inputmode="numeric">
            </div>
        </div>

        <div id="printer-display" class="printer-info"></div>

        <div class="input-group">
            <label>Электричество (руб/кВт·ч)</label>
            <input type="number" id="elec-price" step="0.1" inputmode="decimal">
        </div>

        <div class="input-group">
            <label>Доп. расходы / Амортизация (%)</label>
            <div class="row">
                <input type="number" id="extra-cost" placeholder="Доп. руб" value="0" inputmode="numeric">
                <input type="number" id="amort-perc" value="20" inputmode="numeric">
            </div>
        </div>

        <button class="btn-main" onclick="calculate()">Рассчитать</button>
        <button class="btn-settings" onclick="showScene('settings-scene')">Настройки</button>

        <div id="result" class="hidden"></div>
    </div>

    <div id="settings-scene" class="hidden">
        <h2>Настройки</h2>
        <label>Принтер по умолчанию</label>
        <select id="edit-printer-select" onchange="saveSelection()"></select>
        <div class="row" style="margin-top:10px; margin-bottom: 25px;">
            <button class="btn-edit" onclick="showEditor('printer', true)">Изм.</button>
            <button class="btn-add" onclick="showEditor('printer', null)">+</button>
            <button class="btn-delete" onclick="deleteItem('printer')">Удл.</button>
        </div>

        <label>База филаментов</label>
        <select id="edit-filament-select" onchange="saveSelection()"></select>
        <div class="row" style="margin-top:10px;">
            <button class="btn-edit" onclick="showEditor('filament', true)">Изм.</button>
            <button class="btn-add" onclick="showEditor('filament', null)">+</button>
            <button class="btn-delete" onclick="deleteItem('filament')">Удл.</button>
        </div>

        <button class="btn-settings" style="margin-top:40px;" onclick="showScene('main-scene')">Вернуться</button>
    </div>

    <div id="editor-scene" class="hidden">
        <h2 id="editor-title">Редактор</h2>
        <div id="editor-fields"></div>
        <button class="btn-save" onclick="saveEditor()">Сохранить</button>
        <button class="btn-settings" onclick="showScene('settings-scene')">Отмена</button>
    </div>
</div>

<script>
    // Начальные данные согласно вашим требованиям
    let data = {
        currentPrinterIndex: 0,
        currentFilamentIndex: 0,
        lastElectricityCost: 5.5,
        printers: [
            { name: "ad5x/5m/5mpro", power: 650.0, specs: "220x220x220 мм" },
            { name: "Ender 3s1 pro", power: 350.0, specs: "220x220x270 мм" }
        ],
        filaments: [
            { type: "PLA", cost_per_kg: 1000.0, density: 1.24 },
            { type: "PETG", cost_per_kg: 900.0, density: 1.27 }
        ]
    };

    function loadFromStorage() {
        const saved = localStorage.getItem('3d_calc_v3_data');
        if (saved) data = JSON.parse(saved);
        updateUI();
    }

    function saveToStorage() {
        localStorage.setItem('3d_calc_v3_data', JSON.stringify(data));
        updateUI();
    }

    function showScene(sceneId) {
        document.getElementById('main-scene').classList.add('hidden');
        document.getElementById('settings-scene').classList.add('hidden');
        document.getElementById('editor-scene').classList.add('hidden');
        document.getElementById(sceneId).classList.remove('hidden');
    }

    function updateUI() {
        const fSelect = document.getElementById('filament-select');
        const fEditSelect = document.getElementById('edit-filament-select');
        fSelect.innerHTML = ''; fEditSelect.innerHTML = '';
        data.filaments.forEach((f, i) => {
            // Используем "руб." вместо спецсимвола
            fSelect.innerHTML += `<option value="${i}">${f.type} (${f.cost_per_kg} руб.)</option>`;
            fEditSelect.innerHTML += `<option value="${i}">${f.type}</option>`;
        });
        fSelect.value = data.currentFilamentIndex;
        fEditSelect.value = data.currentFilamentIndex;

        const pEditSelect = document.getElementById('edit-printer-select');
        pEditSelect.innerHTML = '';
        data.printers.forEach((p, i) => {
            pEditSelect.innerHTML += `<option value="${i}">${p.name}</option>`;
        });
        pEditSelect.value = data.currentPrinterIndex;

        const p = data.printers[data.currentPrinterIndex];
        document.getElementById('printer-display').innerText = `${p.name} | ${p.power}W | ${p.specs}`;
        document.getElementById('elec-price').value = data.lastElectricityCost;
    }

    function saveSelection() {
        data.currentFilamentIndex = parseInt(document.getElementById('filament-select').value) || 0;
        data.currentPrinterIndex = parseInt(document.getElementById('edit-printer-select').value) || 0;
        saveToStorage();
    }

    let currentEditMode = null, currentEditIndex = null;
    function showEditor(mode, edit) {
        currentEditMode = mode;
        currentEditIndex = edit ? (mode === 'printer' ? data.currentPrinterIndex : data.currentFilamentIndex) : null;
        document.getElementById('editor-title').innerText = edit ? "Изменить" : "Добавить";
        const fields = document.getElementById('editor-fields');
        fields.innerHTML = '';
        if (mode === 'printer') {
            const item = edit ? data.printers[currentEditIndex] : {name:'', power:'', specs:''};
            fields.innerHTML = `
                <div class="input-group"><label>Название</label><input id="edit-1" value="${item.name}"></div>
                <div class="input-group"><label>Мощность (Вт)</label><input type="number" id="edit-2" value="${item.power}"></div>
                <div class="input-group"><label>Область печати</label><input id="edit-3" value="${item.specs}"></div>`;
        } else {
            const item = edit ? data.filaments[currentEditIndex] : {type:'', cost_per_kg:'', density:''};
            fields.innerHTML = `
                <div class="input-group"><label>Тип материала</label><input id="edit-1" value="${item.type}"></div>
                <div class="input-group"><label>Цена за кг (руб)</label><input type="number" id="edit-2" value="${item.cost_per_kg}"></div>
                <div class="input-group"><label>Плотность (г/см³)</label><input type="number" id="edit-3" value="${item.density || 1.24}"></div>`;
        }
        showScene('editor-scene');
    }

    function saveEditor() {
        const v1 = document.getElementById('edit-1').value, 
              v2 = parseFloat(document.getElementById('edit-2').value), 
              v3 = document.getElementById('edit-3').value;
        if (!v1 || isNaN(v2)) return alert("Пожалуйста, заполните данные корректно");
        
        if (currentEditMode === 'printer') {
            const obj = { name: v1, power: v2, specs: v3 };
            if (currentEditIndex !== null) data.printers[currentEditIndex] = obj; else data.printers.push(obj);
        } else {
            const obj = { type: v1, cost_per_kg: v2, density: parseFloat(v3) };
            if (currentEditIndex !== null) data.filaments[currentEditIndex] = obj; else data.filaments.push(obj);
        }
        saveToStorage();
        showScene('settings-scene');
    }

    function deleteItem(mode) {
        const list = mode === 'printer' ? data.printers : data.filaments;
        if (list.length <= 1) return alert("Нельзя удалить последний элемент");
        list.splice(mode === 'printer' ? data.currentPrinterIndex : data.currentFilamentIndex, 1);
        if (mode === 'printer') data.currentPrinterIndex = 0; else data.currentFilamentIndex = 0;
        saveToStorage();
    }

    function calculate() {
        try {
            const weight = parseFloat(document.getElementById('weight').value) || 0;
            const hours = parseFloat(document.getElementById('hours').value) || 0;
            const mins = parseFloat(document.getElementById('mins').value) || 0;
            const elecPrice = parseFloat(document.getElementById('elec-price').value) || 0;
            const extra = parseFloat(document.getElementById('extra-cost').value) || 0;
            const amortPerc = parseFloat(document.getElementById('amort-perc').value) || 0;

            data.lastElectricityCost = elecPrice;
            saveToStorage();

            const totalHours = hours + (mins / 60);
            const p = data.printers[data.currentPrinterIndex];
            const f = data.filaments[data.currentFilamentIndex];

            const matCost = (weight / 1000) * f.cost_per_kg;
            const energyKwh = (p.power * totalHours) / 1000;
            const elecCost = energyKwh * elecPrice;
            const base = matCost + elecCost + extra;
            const amort = base * (amortPerc / 100);
            const total = base + amort;
            const recommended = total * 3;

            const resDiv = document.getElementById('result');
            resDiv.classList.remove('hidden');
            resDiv.innerHTML = `
                <div style="font-size:14px; color:#8e8e93; text-transform: uppercase; letter-spacing: 1px;">Себестоимость</div>
                <div style="font-size:28px; font-weight:bold; margin-bottom:12px;">${total.toFixed(2)} руб.</div>
                <div style="font-size:14px; color:#8e8e93; line-height:1.6; background: #3a3a3c; padding: 10px; border-radius: 8px;">
                    • Пластик: ${matCost.toFixed(2)} руб.<br>
                    • Энергия: ${elecCost.toFixed(2)} руб.<br>
                    • Амортизация: ${amort.toFixed(2)} руб.
                </div>
                <div class="sale-price">
                    Рекомендуемая цена (x3):<br>
                    <div style="font-size:32px; margin-top:5px;">${recommended.toFixed(0)} руб.</div>
                </div>`;
            
            resDiv.scrollIntoView({ behavior: 'smooth' });
            
        } catch (e) { alert("Ошибка в расчетах. Проверьте введенные числа."); }
    }
    window.onload = loadFromStorage;
</script>
</body>
</html>
